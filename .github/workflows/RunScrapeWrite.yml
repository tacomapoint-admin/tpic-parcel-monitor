name: Run Scrape + Write

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: node Scrape325_Write.js

      - name: Upload results.json
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: results.json

      - name: Send to Google Sheets
        run: node WriteToSheet.js
